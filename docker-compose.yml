version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ─── PostgreSQL Database ───
  postgres:
    image: postgres:16-alpine
    container_name: soc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: soc_platform
      POSTGRES_USER: soc_user
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-soc_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soc_user -d soc_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    logging: *default-logging
    networks:
      - soc-network

  # ─── Redis Queue ───
  redis:
    image: redis:7-alpine
    container_name: soc-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"
    logging: *default-logging
    networks:
      - soc-network

  # ─── Ollama (Local LLM) ───
  ollama:
    image: ollama/ollama:latest
    container_name: soc-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_KEEP_ALIVE: 5m
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "11434:11434"
    logging: *default-logging
    networks:
      - soc-network

  # ─── FastAPI Backend ───
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: soc-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://soc_user:${DATABASE_PASSWORD:-soc_password}@postgres:5432/soc_platform
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "8000:8000"
    logging: *default-logging
    networks:
      - soc-network

  # ─── Background Workers ───
  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    container_name: soc-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://soc_user:${DATABASE_PASSWORD:-soc_password}@postgres:5432/soc_platform
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -q 'worker' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging
    networks:
      - soc-network
    # Scale with: docker compose up -d --scale worker=2

  # ─── Dashboard ───
  dashboard:
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
    container_name: soc-dashboard
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "80:80"
    logging: *default-logging
    networks:
      - soc-network

volumes:
  postgres_data:
  redis_data:
  ollama_data:

networks:
  soc-network:
    driver: bridge
