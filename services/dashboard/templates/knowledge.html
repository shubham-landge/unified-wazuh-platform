{% extends "base.html" %}
{% block content %}
<div class="max-w-6xl mx-auto space-y-6" x-data="{
    activeSource: '',
    sources: {{ sources | tojson }},
    chunks: {{ chunks | tojson }},
    searchQuery: '',
    get filteredChunks() {
        let items = this.chunks;
        if (this.activeSource) items = items.filter(c => c.source === this.activeSource);
        if (this.searchQuery) items = items.filter(c => c.chunk_text.toLowerCase().includes(this.searchQuery.toLowerCase()));
        return items;
    }
}">
    <div class="flex justify-between items-center mb-2">
        <div>
            <h1 class="text-2xl font-bold text-white tracking-tight">Knowledge Base</h1>
            <p class="text-xs text-secondary mt-0.5">Semantic search over SOC playbooks, compliance docs, and security knowledge.</p>
        </div>
        <div class="flex items-center gap-2 bg-surface border border-white/5 rounded-lg p-1">
            <button @click="activeSource = ''" :class="activeSource === '' ? 'bg-accent-blue text-white' : 'text-secondary hover:text-white'" class="px-3 py-1.5 rounded-md text-xs font-semibold transition-all">All</button>
            <template x-for="s in sources" :key="s">
                <button @click="activeSource = s" :class="activeSource === s ? 'bg-accent-blue text-white' : 'text-secondary hover:text-white'" class="px-3 py-1.5 rounded-md text-xs font-semibold transition-all" x-text="s"></button>
            </template>
        </div>
    </div>

    <div class="relative">
        <input x-model="searchQuery" type="text" placeholder="Search knowledge base..." class="w-full bg-surface border border-white/5 focus:border-accent-blue/50 text-sm px-4 py-3 pl-10 rounded-xl text-primary outline-none">
        <svg class="absolute left-3 top-3.5 w-5 h-5 text-muted" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    </div>

    <div class="space-y-4">
        <template x-for="chunk in filteredChunks" :key="chunk.id">
            <div class="card-premium">
                <div class="flex justify-between items-start mb-2">
                    <div class="flex items-center gap-2">
                        <span class="px-2 py-0.5 bg-accent-blue/10 border border-accent-blue/25 text-accent-blue rounded font-mono text-[10px] font-bold" x-text="chunk.source"></span>
                        <span class="text-[10px] text-muted" x-text="chunk.token_count + ' tokens'"></span>
                    </div>
                    <span class="text-[10px] text-muted" x-text="chunk.created_at ? new Date(chunk.created_at).toLocaleDateString() : ''"></span>
                </div>
                <p class="text-xs text-primary leading-relaxed" x-text="chunk.chunk_text"></p>
            </div>
        </template>
        <div x-show="filteredChunks.length === 0" class="text-center py-12 text-muted text-xs">
            No knowledge chunks found. In压 knowledge from the <a href="/settings" class="text-accent-blue hover:underline">settings page</a> or queue ingestion via the API.
        </div>
    </div>
</div>
{% endblock %}
