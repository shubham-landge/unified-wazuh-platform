{% if steps|length == 0 %}
<div class="text-center py-4 text-muted text-xs">No investigation steps defined.</div>
{% else %}
<div class="space-y-2">
  {% for step in steps %}
  <div class="flex items-start gap-3 px-3 py-2 rounded-lg
    {% if step.completed %}bg-accent-green/5 border border-accent-green/10{% else %}bg-white/5 border border-white/5{% endif %}">
    <input type="checkbox"
           class="mt-0.5 cursor-pointer accent-accent-green"
           {% if step.completed %}checked{% endif %}
           hx-patch="/cases/{{ case_id }}/steps/{{ step.id }}"
           hx-target="#investigation-steps"
           hx-swap="innerHTML">
    <div class="flex-1 min-w-0">
      <p class="text-xs {% if step.completed %}text-muted line-through{% else %}text-primary{% endif %}">
        {{ step.description }}
      </p>
      {% if step.completed and step.completed_at %}
      <p class="text-[9px] text-muted mt-0.5">Completed {{ step.completed_at[:10] if step.completed_at else '' }}</p>
      {% endif %}
    </div>
    <span class="text-[9px] text-muted shrink-0">#{{ step.order + 1 }}</span>
  </div>
  {% endfor %}
</div>
{% endif %}
<div class="mt-3">
  <form hx-post="/cases/{{ case_id }}/steps"
        hx-target="#investigation-steps"
        hx-swap="innerHTML"
        class="flex gap-2">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <input type="text" name="description" placeholder="Add investigation step..."
           class="flex-1 bg-white/5 border border-white/10 rounded px-2 py-1 text-xs text-white placeholder:text-muted focus:outline-none focus:border-accent-blue">
    <button type="submit" class="px-3 py-1 bg-accent-blue hover:bg-accent-blue/80 text-white rounded text-[10px] font-bold">
      + Add
    </button>
  </form>
</div>
