<div class="space-y-4">
    <div class="flex justify-between items-center border-b border-white/5 pb-3">
        <div>
            <h3 class="text-xs font-bold text-white uppercase tracking-wider">White-Label Branding</h3>
            <p class="text-[10px] text-muted">Customize the SOC platform look and feel for your organization.</p>
        </div>
    </div>

    <div x-data="{ saved: false }" class="space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="flex flex-col gap-1.5">
                <label class="text-[10px] text-muted font-bold uppercase tracking-wider">Primary Color</label>
                <div class="flex gap-2">
                    <input type="color" name="primary_color" value="{{ branding.primary_color or '#3b82f6' }}"
                           class="w-10 h-10 rounded-lg border border-white/10 cursor-pointer bg-deep">
                    <input type="text" name="primary_color_display" value="{{ branding.primary_color or '#3b82f6' }}"
                           class="flex-1 bg-deep border border-white/5 focus:border-accent-blue/50 text-xs px-3 py-2 rounded-lg text-primary outline-none font-mono"
                           @input="$el.previousElementSibling.value = $el.value">
                </div>
            </div>
            <div class="flex flex-col gap-1.5">
                <label class="text-[10px] text-muted font-bold uppercase tracking-wider">Secondary Color</label>
                <div class="flex gap-2">
                    <input type="color" name="secondary_color" value="{{ branding.secondary_color or '#94a3b8' }}"
                           class="w-10 h-10 rounded-lg border border-white/10 cursor-pointer bg-deep">
                    <input type="text" name="secondary_color_display" value="{{ branding.secondary_color or '#94a3b8' }}"
                           class="flex-1 bg-deep border border-white/5 focus:border-accent-blue/50 text-xs px-3 py-2 rounded-lg text-primary outline-none font-mono"
                           @input="$el.previousElementSibling.value = $el.value">
                </div>
            </div>
        </div>

        <div class="flex flex-col gap-1.5">
            <label class="text-[10px] text-muted font-bold uppercase tracking-wider">Organization Name</label>
            <input type="text" name="company_name" value="{{ branding.company_name or 'WAZUH' }}"
                   class="bg-deep border border-white/5 focus:border-accent-blue/50 text-xs px-3 py-2 rounded-lg text-primary outline-none">
        </div>

        <div class="flex flex-col gap-1.5">
            <label class="text-[10px] text-muted font-bold uppercase tracking-wider">Logo URL</label>
            <input type="url" name="logo_url" value="{{ branding.logo_url or '' }}"
                   placeholder="https://your-company.com/logo.png"
                   class="bg-deep border border-white/5 focus:border-accent-blue/50 text-xs px-3 py-2 rounded-lg text-primary outline-none">
            <p class="text-[10px] text-muted">URL to your organization's logo (ideal size: 32x32 or 40x40 px)</p>
        </div>

        <div class="flex flex-col gap-1.5">
            <label class="text-[10px] text-muted font-bold uppercase tracking-wider">Favicon URL</label>
            <input type="url" name="favicon_url" value="{{ branding.favicon_url or '' }}"
                   placeholder="https://your-company.com/favicon.ico"
                   class="bg-deep border border-white/5 focus:border-accent-blue/50 text-xs px-3 py-2 rounded-lg text-primary outline-none">
        </div>

        <div class="flex flex-col gap-1.5">
            <label class="text-[10px] text-muted font-bold uppercase tracking-wider">Custom CSS</label>
            <textarea name="custom_css" rows="4"
                      class="bg-deep border border-white/5 focus:border-accent-blue/50 text-xs px-3 py-2 rounded-lg text-primary outline-none font-mono"
                      placeholder="/* Add custom CSS overrides here */">{{ branding.custom_css or '' }}</textarea>
            <p class="text-[10px] text-muted">Advanced: inject custom CSS to override platform styles.</p>
        </div>

        <div class="flex justify-between items-center pt-4 border-t border-white/5">
            <div>
                <div class="flex items-center gap-3 p-3 bg-deep rounded-lg border border-white/5">
                    <span class="text-[10px] text-muted">Preview:</span>
                    <div class="flex items-center gap-2">
                        <img x-show="{{ 'true' if branding.logo_url else 'false' }}"
                             :src="'{{ branding.logo_url }}'" class="w-8 h-8 rounded"
                             @error="$el.style.display='none'">
                        <span class="text-xs font-bold" style="color: {{ branding.primary_color or '#3b82f6' }}">
                            {{ branding.company_name or 'WAZUH' }}
                        </span>
                    </div>
                </div>
            </div>
            <button type="button" @click="
                const form = new FormData();
                form.append('primary_color', document.querySelector('[name=primary_color]').value);
                form.append('secondary_color', document.querySelector('[name=secondary_color]').value);
                form.append('company_name', document.querySelector('[name=company_name]').value);
                form.append('logo_url', document.querySelector('[name=logo_url]').value);
                form.append('favicon_url', document.querySelector('[name=favicon_url]').value);
                form.append('custom_css', document.querySelector('[name=custom_css]').value);
                fetch('/settings/branding', { method: 'POST', body: form })
                    .then(r => r.json())
                    .then(r => { saved = true; window.addGlobalToast('success', 'Branding saved! Refresh to see changes.'); });
            " class="px-4 py-2 bg-accent-blue hover:bg-accent-blue/90 text-white rounded-lg text-xs font-bold transition-all shadow-[0_0_10px_rgba(59,130,246,0.15)]">
                Save Branding Settings
            </button>
        </div>
    </div>
</div>
