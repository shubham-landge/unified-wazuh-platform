<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Wazuh AI SOC Platform</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- HTMX, Alpine, and Tailwind -->
    <script src="https://unpkg.com/htmx.org@2.0.3"></script>
    <script src="https://unpkg.com/alpinejs@3.14.3" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        deep: '#070b14',
                        surface: '#0d1321',
                        elevated: '#151d30',
                        primary: '#e8edf5',
                        secondary: '#94a3b8',
                        muted: '#64748b',
                        accent: {
                            blue: '#3b82f6',
                            red: '#dc2626',
                            green: '#22c55e',
                            yellow: '#eab308',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-deep text-primary min-h-screen flex items-center justify-center font-sans">
    <div class="w-full max-w-md p-6" x-data="{ loading: false, email: '', password: '', error: '{{ error or '' }}' }">
        <!-- Brand Header -->
        <div class="text-center mb-8">
            <div class="inline-flex p-3 bg-accent-blue/15 border border-accent-blue/30 rounded-xl mb-3 shadow-[0_0_15px_rgba(59,130,246,0.1)]">
                <svg class="w-8 h-8 text-accent-blue" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.57-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/>
                </svg>
            </div>
            <h1 class="text-xl font-bold text-white tracking-tight">Wazuh AI SOC Platform</h1>
            <p class="text-xs text-muted mt-1">Sign in to access the security operations command center.</p>
        </div>

        <!-- Login Card -->
        <div class="card-premium bg-surface border border-white/5 rounded-2xl p-6 shadow-2xl relative overflow-hidden">
            <!-- Alert/Error Box -->
            <div x-show="error" x-cloak class="mb-4 p-3 bg-accent-red/15 border border-accent-red/20 text-accent-red rounded-lg text-xs font-semibold flex items-center gap-2">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
                <span x-text="error"></span>
            </div>

            <!-- Login Form -->
            <form action="/login" method="POST" @submit="loading = true; error = ''" class="space-y-4">
                <div class="flex flex-col gap-1.5">
                    <label class="text-[10px] text-muted font-bold uppercase tracking-wider">Email Address</label>
                    <input type="email" name="email" x-model="email" required placeholder="analyst@company.com" class="w-full bg-deep border border-white/5 focus:border-accent-blue/50 text-xs px-3 py-2.5 rounded-lg text-primary outline-none transition-all">
                </div>

                <div class="flex flex-col gap-1.5">
                    <div class="flex justify-between items-center">
                        <label class="text-[10px] text-muted font-bold uppercase tracking-wider">Password</label>
                        <a href="#" class="text-[10px] text-accent-blue hover:underline">Forgot?</a>
                    </div>
                    <input type="password" name="password" x-model="password" required placeholder="••••••••••••" class="w-full bg-deep border border-white/5 focus:border-accent-blue/50 text-xs px-3 py-2.5 rounded-lg text-primary outline-none transition-all">
                </div>

                <button type="submit" :disabled="loading" class="w-full py-2.5 bg-accent-blue hover:bg-accent-blue/90 disabled:opacity-50 text-white rounded-lg text-xs font-bold shadow-[0_0_12px_rgba(59,130,246,0.2)] transition-all flex items-center justify-center gap-2 mt-6">
                    <svg x-show="loading" class="animate-spin h-3.5 w-3.5 text-white" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span x-text="loading ? 'Authenticating...' : 'Sign In'"></span>
                </button>
            </form>
        </div>
    </div>
</body>
</html>
