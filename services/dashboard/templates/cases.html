{% extends "base.html" %}
{% block content %}
<div x-data="casesDashboardState()">
    <!-- Page Header -->
    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-bold text-white tracking-tight">Security Incident Case Manager</h1>
            <p class="text-xs text-secondary mt-0.5">Track, assign, and resolve active threat investigations and security audits.</p>
        </div>
        
        <!-- Action Buttons -->
        <div class="flex gap-2">
            <!-- Bulk Action Dropdown (Only visible if cases selected) -->
            <div x-show="selectedCases.length > 0" class="relative" x-data="{ open: false }">
                <button @click="open = !open" class="px-4 py-2 bg-elevated border border-white/10 hover:border-white/20 text-white rounded-lg text-xs font-semibold transition-all flex items-center gap-1.5">
                    Bulk Status
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
                </button>
                <div x-show="open" @click.away="open = false" class="absolute right-0 mt-1.5 w-40 bg-elevated border border-white/10 rounded-lg shadow-2xl p-1 z-30 space-y-0.5">
                    <button @click="changeBulkStatus('open')" class="w-full text-left px-3 py-1.5 hover:bg-white/5 rounded text-xs text-primary font-medium">Mark Open</button>
                    <button @click="changeBulkStatus('in_progress')" class="w-full text-left px-3 py-1.5 hover:bg-white/5 rounded text-xs text-primary font-medium">Mark In Progress</button>
                    <button @click="changeBulkStatus('resolved')" class="w-full text-left px-3 py-1.5 hover:bg-white/5 rounded text-xs text-primary font-medium">Mark Resolved</button>
                    <button @click="changeBulkStatus('closed')" class="w-full text-left px-3 py-1.5 hover:bg-white/5 rounded text-xs text-primary font-medium">Mark Closed</button>
                </div>
            </div>

            <!-- Create Case Button -->
            <button @click="createModalOpen = true" class="px-4 py-2 bg-gradient-to-r from-accent-blue to-accent-blue/80 text-white rounded-lg text-xs font-semibold hover:shadow-[0_0_15px_rgba(59,130,246,0.3)] transition-all flex items-center gap-1.5">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
                New Case
            </button>
        </div>
    </div>

    <!-- Filter Toolbar -->
    <div class="card-premium p-4 mb-6 bg-surface/50 border border-white/5">
        <div class="flex flex-wrap gap-3 items-center">
            <!-- Search -->
            <div class="flex-1 min-w-[200px]">
                <input type="text" placeholder="Search case title or assignee..." x-model="search" class="w-full bg-deep border border-white/5 focus:border-accent-blue/50 text-xs px-3 py-2 rounded-lg text-primary outline-none">
            </div>

            <!-- Status Filter -->
            <select x-model="statusFilter" class="bg-deep border border-white/5 focus:border-accent-blue/50 text-xs px-3 py-2 rounded-lg text-primary outline-none">
                <option value="">All Statuses</option>
                <option value="open">Open</option>
                <option value="in_progress">In Progress</option>
                <option value="resolved">Resolved</option>
                <option value="closed">Closed</option>
                <option value="false_positive">False Positive</option>
            </select>

            <!-- Severity Filter -->
            <select x-model="severityFilter" class="bg-deep border border-white/5 focus:border-accent-blue/50 text-xs px-3 py-2 rounded-lg text-primary outline-none">
                <option value="">All Severities</option>
                <option value="critical">Critical</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
            </select>

            <!-- Clear filters -->
            <button @click="resetFilters()" x-show="search || statusFilter || severityFilter" class="text-xs text-accent-blue hover:underline">
                Clear Filters
            </button>
        </div>
    </div>

    <!-- Cases Data Table -->
    <div class="card-premium overflow-hidden border border-white/5">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse text-xs">
                <thead>
                    <tr class="border-b border-white/10 bg-deep/40">
                        <th class="p-3 w-10">
                            <input type="checkbox" @change="toggleSelectAll($event)" :checked="selectedCases.length === filteredCases().length && filteredCases().length > 0" class="rounded border-white/10 bg-deep focus:ring-0">
                        </th>
                        <th class="p-3 font-semibold text-muted text-[10px] uppercase tracking-wider">Created</th>
                        <th class="p-3 font-semibold text-muted text-[10px] uppercase tracking-wider">Severity</th>
                        <th class="p-3 font-semibold text-muted text-[10px] uppercase tracking-wider">Status</th>
                        <th class="p-3 font-semibold text-muted text-[10px] uppercase tracking-wider">Title</th>
                        <th class="p-3 font-semibold text-muted text-[10px] uppercase tracking-wider">Category</th>
                        <th class="p-3 font-semibold text-muted text-[10px] uppercase tracking-wider">Assigned To</th>
                        <th class="p-3 font-semibold text-muted text-[10px] uppercase tracking-wider">Escalated</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-white/5">
                    <template x-for="c in filteredCases()" :key="c.id">
                        <tr class="hover:bg-white/5 transition-all cursor-pointer">
                            <td class="p-3" @click.stop>
                                <input type="checkbox" :value="c.id" x-model="selectedCases" class="rounded border-white/10 bg-deep focus:ring-0">
                            </td>
                            <td class="p-3 text-secondary font-mono" x-text="formatTime(c.created_at)" @click="openCase(c.id)"></td>
                            <td class="p-3" @click="openCase(c.id)">
                                <span class="badge-dot" :class="'badge-dot-' + c.severity" x-text="c.severity"></span>
                            </td>
                            <td class="p-3" @click="openCase(c.id)">
                                <span class="badge-dot" :class="'badge-dot-' + c.status" x-text="c.status.replace('_', ' ')"></span>
                            </td>
                            <td class="p-3 font-medium text-primary max-w-sm truncate" x-text="c.title" @click="openCase(c.id)"></td>
                            <td class="p-3 text-secondary font-medium" x-text="c.category || 'N/A'" @click="openCase(c.id)"></td>
                            <td class="p-3 text-secondary font-mono" x-text="c.assigned_to || '—'" @click="openCase(c.id)"></td>
                            <td class="p-3" @click="openCase(c.id)">
                                <span x-show="c.escalation_required" class="text-accent-red font-bold">⚠ Escalated</span>
                                <span x-show="!c.escalation_required" class="text-muted">—</span>
                            </td>
                        </tr>
                    </template>
                    <tr x-show="filteredCases().length === 0">
                        <td colspan="8" class="p-12 text-center text-muted">
                            <svg class="w-8 h-8 mx-auto text-muted/30 mb-2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
                            <span class="font-medium">No cases recorded</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Create Case Overlay Modal -->
    <div x-show="createModalOpen" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center" x-transition>
        <div class="w-[550px] bg-surface border border-white/10 rounded-2xl shadow-2xl p-6" @click.away="createModalOpen = false">
            <div class="flex justify-between items-center border-b border-white/5 pb-4 mb-4">
                <h3 class="text-md font-bold text-white flex items-center gap-2">
                    <svg class="w-5 h-5 text-accent-blue" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
                    Create Security Case
                </h3>
                <button @click="createModalOpen = false" class="text-muted hover:text-white">&times;</button>
            </div>
            
            <!-- Creation Form -->
            <form hx-post="/cases" hx-target="body" hx-swap="outerHTML" @submit="createModalOpen = false" class="space-y-4">
                <div class="flex flex-col gap-1.5">
                    <label class="text-[10px] text-muted font-bold uppercase tracking-wider">Case Title</label>
                    <input type="text" name="title" required placeholder="e.g. Host brute force escalation" class="bg-deep border border-white/5 focus:border-accent-blue/50 text-xs px-3 py-2 rounded-lg text-primary outline-none">
                </div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-[10px] text-muted font-bold uppercase tracking-wider">Description</label>
                    <textarea name="description" rows="3" placeholder="Provide investigation details..." class="bg-deep border border-white/5 focus:border-accent-blue/50 text-xs px-3 py-2 rounded-lg text-primary outline-none"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1.5">
                        <label class="text-[10px] text-muted font-bold uppercase tracking-wider">Severity</label>
                        <select name="severity" class="bg-deep border border-white/5 focus:border-accent-blue/50 text-xs px-3 py-2 rounded-lg text-primary outline-none">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                            <option value="critical">Critical</option>
                        </select>
                    </div>

                    <div class="flex flex-col gap-1.5">
                        <label class="text-[10px] text-muted font-bold uppercase tracking-wider">Category</label>
                        <input type="text" name="category" placeholder="e.g. auth, malware" class="bg-deep border border-white/5 focus:border-accent-blue/50 text-xs px-3 py-2 rounded-lg text-primary outline-none">
                    </div>
                </div>

                <div class="flex justify-end gap-2 border-t border-white/5 pt-4 mt-6">
                    <button type="button" @click="createModalOpen = false" class="px-4 py-2 border border-white/5 hover:bg-white/5 text-white rounded-lg text-xs font-semibold transition-all">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-accent-blue hover:bg-accent-blue/90 text-white rounded-lg text-xs font-bold shadow-[0_0_10px_rgba(59,130,246,0.2)] transition-all">Create Case</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function casesDashboardState() {
        return {
            cases: [
                {% for case in cases %}
                {
                    id: "{{ case.id }}",
                    title: "{{ case.title }}",
                    severity: "{{ case.severity }}",
                    status: "{{ case.status }}",
                    category: "{{ case.category or '' }}",
                    assigned_to: "{{ case.assigned_to or '' }}",
                    escalation_required: {{ 'true' if case.escalation_required else 'false' }},
                    created_at: "{{ case.created_at or '' }}"
                },
                {% endfor %}
            ],
            search: '',
            statusFilter: '',
            severityFilter: '',
            selectedCases: [],
            createModalOpen: false,

            formatTime(ts) {
                if (!ts) return 'N/A';
                return ts.substring(0, 19).replace('T', ' ');
            },

            resetFilters() {
                this.search = '';
                this.statusFilter = '';
                this.severityFilter = '';
            },

            filteredCases() {
                return this.cases.filter(c => {
                    const query = this.search.toLowerCase();
                    const matchesSearch = !this.search || 
                        c.title.toLowerCase().includes(query) ||
                        c.assigned_to.toLowerCase().includes(query);

                    const matchesStatus = !this.statusFilter || c.status === this.statusFilter;
                    const matchesSeverity = !this.severityFilter || c.severity === this.severityFilter;

                    return matchesSearch && matchesStatus && matchesSeverity;
                });
            },

            toggleSelectAll(e) {
                if (e.target.checked) {
                    this.selectedCases = this.filteredCases().map(c => c.id);
                } else {
                    this.selectedCases = [];
                }
            },

            openCase(id) {
                htmx.ajax('GET', `/cases/${id}`, {target: 'body', swap: 'outerHTML', pushUrl: true});
            },

            changeBulkStatus(status) {
                if (this.selectedCases.length === 0) return;
                
                window.addGlobalToast("info", `Updating ${this.selectedCases.length} cases status to ${status}...`);
                
                htmx.ajax('POST', '/cases/bulk-status', {
                    values: { case_ids: this.selectedCases.join(','), status: status },
                    target: 'body',
                    swap: 'outerHTML'
                });
                this.selectedCases = [];
            }
        };
    }
</script>
{% endblock %}
