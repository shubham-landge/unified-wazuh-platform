apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: soc-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
              name: http
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          resources:
            limits:
              cpu: "4"
              memory: 8Gi
            requests:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            exec:
              command: ["ollama", "list"]
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: ollama-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: soc-platform
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
