apiVersion: v1
kind: ConfigMap
metadata:
  name: soc-config
  namespace: soc-platform
data:
  APP_NAME: "Unified Wazuh SOC Platform"
  APP_VERSION: "1.0.0"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  WAZUH_ENV: "production"
  API_RATE_LIMIT: "100"
  API_DEFAULT_PAGE_LIMIT: "100"
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRATION_HOURS: "24"
  POLL_INTERVAL_SECONDS: "60"
  ALERT_LOOKBACK_HOURS: "24"
  MAX_ALERTS_PER_POLL: "100"
  VULN_POLL_INTERVAL_HOURS: "6"
  REPORTS_STORAGE_PATH: "/app/reports"
  METERING_ENABLED: "true"
  METERING_RETENTION_DAYS: "365"
  METERING_DEFAULT_ALERT_LIMIT: "100000"
  METERING_DEFAULT_API_LIMIT: "500000"
  METERING_DEFAULT_STORAGE_GB: "10"
  METERING_DEFAULT_AI_TRIAGE_LIMIT: "5000"
