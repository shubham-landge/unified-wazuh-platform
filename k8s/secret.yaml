apiVersion: v1
kind: Secret
metadata:
  name: soc-secrets
  namespace: soc-platform
type: Opaque
stringData:
  # Generate production secrets before applying:
  #   kubectl create secret generic soc-secrets -n soc-platform \
  #     --from-literal=SECRET_KEY=$(openssl rand -hex 32) \
  #     --from-literal=JWT_SECRET_KEY=$(openssl rand -hex 32) \
  #     --from-literal=DATABASE_PASSWORD=... \
  #     --from-literal=REDIS_PASSWORD=... \
  #     --from-literal=API_KEYS=soc-prod-key-001
  SECRET_KEY: "CHANGE_ME"
  JWT_SECRET_KEY: "CHANGE_ME"
  DATABASE_PASSWORD: "CHANGE_ME"
  REDIS_PASSWORD: "CHANGE_ME"
  API_KEYS: "CHANGE_ME"
