apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: soc-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: unified-wazuh-platform/dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          envFrom:
            - configMapRef:
                name: soc-config
          env:
            - name: API_BASE_URL
              value: "http://api:8000"
            - name: API_KEYS
              valueFrom:
                secretKeyRef:
                  name: soc-secrets
                  key: API_KEYS
          resources:
            limits:
              cpu: "500m"
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: soc-platform
spec:
  selector:
    app: dashboard
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dashboard
  namespace: soc-platform
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: soc.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard
                port:
                  number: 80
