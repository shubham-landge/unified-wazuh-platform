apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: soc-platform
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "soc_platform"
            - name: POSTGRES_USER
              value: "soc_user"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: soc-secrets
                  key: DATABASE_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "soc_user", "-d", "soc_platform"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "soc_user", "-d", "soc_platform"]
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: soc-platform
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
